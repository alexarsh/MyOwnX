server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS; re-resolve upstreams so recreated service
    # containers (new IPs) don't leave the gateway pointing at dead ones.
    resolver 127.0.0.11 valid=10s;
    set $user_upstream http://user-service:9001;
    set $post_upstream http://post-service:9002;
    set $timeline_upstream http://timeline-service:9003;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location /api/users {
        proxy_pass $user_upstream;
    }

    location /api/posts {
        proxy_pass $post_upstream;
    }

    location /api/timeline {
        proxy_pass $timeline_upstream;
    }

    location /api/search {
        proxy_pass $timeline_upstream;
    }

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|css|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
