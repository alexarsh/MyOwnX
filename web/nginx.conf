server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location /api/users {
        proxy_pass http://user-service:9001;
    }

    location /api/posts {
        proxy_pass http://post-service:9002;
    }

    location /api/timeline {
        proxy_pass http://timeline-service:9003;
    }

    location /api/search {
        proxy_pass http://timeline-service:9003;
    }

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|css|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
